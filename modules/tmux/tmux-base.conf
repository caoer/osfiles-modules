# TERMINAL FEATURES {{{
# Features: clipboard, cstyle (cursor style), extkeys, focus, title, RGB (true color),
#           hyperlinks, usstyle (underline style), strikethrough, overline, sync
#
# Note: 'sync' enables mode 2026 synchronized output passthrough
# This allows TUI apps to batch screen updates and reduce flickering
# Requires tmux 3.7+ (master branch) for full mode 2026 support
set -g terminal-features 'xterm*:clipboard:cstyle:extkeys:focus:title:RGB:hyperlinks:usstyle:strikethrough:overline:sync'
set -ga terminal-features 'wezterm:clipboard:ccolour:cstyle:extkeys:focus:title:RGB:hyperlinks:usstyle:strikethrough:overline:sync'
set -ga terminal-features 'screen*:title'
set -ga terminal-features 'rxvt*:ignorefkeys'
# Nested tmux (popup/scratch sessions) — without this, clipboard/OSC52 won't pass through
set -ga terminal-features 'tmux*:clipboard:cstyle:extkeys:focus:title:RGB:hyperlinks:usstyle:strikethrough:overline:sync'

# Default terminal type - use 'wezterm' for best feature support
# Alternatives: 'tmux-256color' (standard), 'xterm-256color' (most compatible)
# Ensure wezterm terminfo is installed:
#   tempfile=$(mktemp) && curl -o $tempfile https://raw.githubusercontent.com/wezterm/wezterm/master/termwiz/data/wezterm.terminfo && tic -x -o ~/.terminfo $tempfile && rm $tempfile
# set -g default-terminal "wezterm"
set -g default-terminal "tmux-256color"

# Extended keys support for modern terminals (WezTerm)
# Enables CSI u encoding for better key detection (Ctrl+Shift+key, etc.)
set -g extended-keys on
# set -g extended-keys-format csi-u

# Passthrough & terminal settings
# Defaults: off (safe for servers/remote). Mac overrides in tmux-local.conf.
set -g allow-passthrough off
set -g focus-events off
set -sg escape-time 10

# History limit - Maximum scrollback buffer
set -g history-limit 50000

# Enable mouse
set -g mouse on
# Allow applications to set the clipboard
set -s set-clipboard on

# Window and pane base index (start from 1 instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Repeat time - how long tmux waits for repeated key presses (in milliseconds)
# After pressing prefix, you can press multiple keys within this time
set -g repeat-time 400

# Window size
set -g window-size 'largest'

# Status bar settings
set -g status-position bottom
set -g status-interval 5
set -g display-time 4000

# Visual activity
# monitor-activity: Detects any output in inactive windows (on = monitor all output)
# visual-activity: Shows popup messages when activity is detected (off = no popups, just highlighting)
setw -g monitor-activity on
set -g visual-activity off

# Monitor bell - always on to catch notifications
setw -g monitor-bell on
set -g bell-action any

# Terminal title support
set -g set-titles on
set -g set-titles-string "#T"

# Dynamic status bar styling based on prefix state
# When prefix is active: Bright purple with white text
# Normal: Default colors to allow window colors to show through
set -g status-style '#{?client_prefix,fg=white bg=#{color_purple_dimmed} bold,fg=default bg=#{color_bg_black}}'

# Status bar with prefix indicator and zoom indicator
# When prefix is active: Bright purple with sparkles
# When zoomed: Yellow/gold
set -g status-left '#{?client_prefix,#[fg=#{color_text_white}]#[bg=#{color_purple_bright}]#[bold] ✨ #[default] ,#{?window_zoomed_flag,#[fg=#{color_text_black}]#[bg=#{color_yellow_bright}]#[bold] ⚡#[default] ,}}[#S] '
set -g status-left-length 40

# Right side status bar - purple theme accent
set -g status-right '#{?client_prefix,#[fg=white]#[bg=#{color_purple_bright}]#[bold] 🎯 Active ,#[fg=#{color_purple_medium}]} %H:%M %d-%b'
set -g status-right-length 60

# Clear Claude notification emoji when window or pane is focused
# NOW HANDLED BY DAEMON: ccc-statusd daemon polls for active window changes (500ms)
# This eliminates process spawning on every pane/window switch for better performance
# Hook-based approach kept as fallback (commented out):
# set-hook -g after-select-window 'run-shell "ccc-statusd clear-emoji #{window_id} #{pane_id}"'
# set-hook -g after-select-pane 'run-shell "ccc-statusd clear-emoji #{window_id} #{pane_id}"'

# Window naming
# Automatic rename DISABLED - we use after-new-window hook instead
set-window-option -g automatic-rename off
# Prevent shell escape sequences from overriding window names (e.g., tmuxinator names)
# Note: tmux commands like `tmux rename-window` still work — this only blocks application escape sequences
set-window-option -g allow-rename off

# Explicitly unset after-new-window hook — a previous config may have set it,
# and commenting out set-hook doesn't remove it from a running server
set-hook -gu after-new-window

# }}}

# Pane Border Styling {{{

# Pane backgrounds — use terminal default for transparency support
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

# Make the active pane VERY obvious with bright borders
set -g pane-active-border-style '#{?client_prefix,fg=colour13 bg=default bold,#{?pane_in_mode,fg=#{color_yellow_bright} bg=default bold,fg=#{color_purple_medium} bg=default bold}}'

# Inactive pane borders - change based on mode:
set -g pane-border-style '#{?client_prefix,fg=#{color_border_inactive_colour_bg} bg=default,#{?pane_in_mode,fg=#{color_border_active_colour} bg=default,fg=#{color_border_inactive_colour_bg} bg=default}}'

set -g pane-border-status top
# pane-border-lines type
# single  single lines using ACS or UTF-8 characters
# double  double lines using UTF-8 characters
# heavy   heavy lines using UTF-8 characters
# simple  simple ASCII characters
# number  the pane number
set -g pane-border-lines simple

set -g pane-border-indicators both
# Show indicators for prefix, mouse/copy mode, zoom, current directory, and git branch
# Mouse indicator shows when pane is in copy mode (scrolling/selecting)
# NOTE: Using cached pane status from tmux-pane-daemon for performance
# Start daemon with: ~/.local/bin/ccc-tmux-hook daemon start

# Go-based pane status with cached SSH detection, git branch, and env vars
# Shows CURRENT_PROFILE and DENV_ENV_NAME (pushed from shell hook)
# DENV_ENV_NAME appears at the end with colored tag matching window name
set -g pane-border-format '#{?client_prefix,#[fg=colour13]#[bold]✨ ,}#{?pane_in_mode,#[fg=colour11]#[bold]🖱️ Mouse ,} #{?window_zoomed_flag,#[fg=colour11]#[bold]⚡,#{?pane_active,#[fg=colour11]● ,#[fg=colour7]  }}#{?pane_active,#[fg=colour11],#[fg=colour7]}#P: #(ccc-statusd pane-status #{pane_id} #{pane_pid} #{pane_current_path} #{?pane_active,1,0} #{history_size} #{history_limit} CURRENT_PROFILE DENV_ENV_NAME) #{?#{@ucc_role},#{?pane_active,#[fg=#{color_cyan}],#[fg=#{color_cyan_dimmed}]}[#{@ucc_role}] ,}#{?#{@ccc_session_id},#{?pane_active,#[fg=#{color_purple_medium}],#[fg=#{color_blue_dimmed}]}#{@ccc_session_id} ,#{?#{@ucc_session_id},#{?pane_active,#[fg=#{color_purple_medium}],#[fg=#{color_blue_dimmed}]}#{@ucc_session_id} ,}}#{?#{@ucc_status},(#{?pane_active,#{?#{==:#{@ucc_status},waiting},#[fg=#9ece6a],#[fg=#{color_yellow_bright}]},#{?#{==:#{@ucc_status},waiting},#[fg=#{color_green_dimmed}],#[fg=#{color_yellow_dimmed}]}}#{@ucc_status}#[default]) ,}'

# }}}

# Visual Feedback {{{

# Display panes numbers when switching (makes it easier to identify)
# Increased time to 3000ms (3 seconds) for better visibility
# set -g display-panes-time 3000
# set -g display-panes-colour 'colour141'  # lavender purple
# set -g display-panes-active-colour 'colour11'  # bright yellow/gold

# Show pane numbers in a larger, more visible format
