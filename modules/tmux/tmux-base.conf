# Activity Window Highlighting {{{

# Current window style (MOST prominent - bright with strong background)
# Tokyo Night: yellow bg with darkest fg
# Shades of Purple: was fg=#050b2e
set -g window-status-current-style 'bg=#{color_yellow_bright} fg=#{color_text_black} bold'

# Style for windows with activity (noticeable but not too bright)
# Tokyo Night: green tint for activity indication
# Shades of Purple: was fg=#ffb3b3 bg=#224436
set -g window-status-activity-style 'fg=#9ece6a bg=#1f2335'

# Bell window style (prominent but less than current window)
set -g window-status-bell-style 'fg=#{color_alert_red} bg=#{color_bg_dark} bold'

# Regular window style (readable)
# Tokyo Night: foreground on dark bg
# Shades of Purple: was fg=#ff9999
set -g window-status-style 'fg=#{color_text_dim} bg=#{color_bg_dark}'

# Format for windows (show bell and zoom indicators)
# Activity is shown through color change only, bell gets an icon, zoom gets indicator
set -g window-status-format ' #I:#W#{?window_zoomed_flag,[⚡],}#{?window_bell_flag,🔔,} '
set -g window-status-current-format '#{?window_zoomed_flag,#[bg=#{color_cyan}]#[fg=#{color_text_black}] #I:#W ⚡ , #I:#W }#{?window_bell_flag,🔔,}'
# }}}

# Key Bindings {{{

bind-key x 'if-shell "[ #{window_panes} -gt 1 ]" "kill-pane" "kill-window"'

# Mouse wheel scrolling - only enter copy mode if not in vim/nvim
bind -n WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "copy-mode -e"

# Unbind defaults before overriding
unbind s
unbind C-s
unbind v
unbind C-v
unbind r
unbind -n C-w

# FZF session picker (Ctrl+e, no prefix)
bind-key -n 'C-e' display-popup -B -E -w 80% -h 80% \
  "sesh list --icons -d | fzf \
    --height=100% \
    --no-sort --ansi --border-label \$'\\033[32m tmux sessions \\033[0m' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^r find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-s:abort' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons -d)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-r:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute-silent(tmux kill-session -t {2..})+change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --preview-window 'right:70%:nowrap' \
    --preview '~/.config/tmux/pane-preview.sh {2..} --tail' | xargs -I {} sesh connect '{}'"

# Locus launcher (Ctrl+F, no prefix)
# Lists tmux + configured sessions (no zoxide noise): Enter switches to the
# highlighted one; type a name + Ctrl+F spins up a NEW session of that name,
# rooted in the locus folder (Mac) or $HOME (servers), with yazi running.
# All logic — host-aware label, root resolution, create-or-switch — lives in
# locus-launcher.sh so the binding stays a one-liner.
bind-key -n 'C-f' display-popup -B -E -w 80% -h 80% "~/.config/tmux/locus-launcher.sh"


