# Nested Sessions Support {{{

color_status_text="#{color_purple_dimmed}"
color_window_off_status_bg="#{color_bg_dark}"
color_light="#{color_text_dim}"
color_dark="#{color_text_dim}"
color_window_off_status_current_bg="#{color_bg_medium}"
color_nested_border="#{color_alert_orange}"  # Orange for nested sessions

# Toggle key bindings for nested sessions (F12)
bind -T root F12  \
    set prefix None \;\
    set key-table off \;\
    set mouse off \;\
    set status-position top \;\
    set status-style "fg=$color_status_text,bg=$color_window_off_status_bg" \;\
    set window-status-current-format "#[fg=$color_window_off_status_bg,bg=$color_window_off_status_current_bg]$separator_powerline_right#[default] #I:#W# #[fg=$color_window_off_status_current_bg,bg=$color_window_off_status_bg]$separator_powerline_right#[default]" \;\
    set window-status-current-style "fg=$color_dark,bold,bg=$color_window_off_status_current_bg" \;\
    set pane-border-lines simple \;\
    set pane-active-border-style "fg=$color_nested_border,bg=default,bold" \;\
    set pane-border-style "fg=$color_nested_border,bg=default" \;\
    set pane-border-format '#{?client_prefix,#[fg=colour13]#[bold]✨ ,}#{?pane_in_mode,#[fg=colour11]#[bold]🖱️ Mouse ,} #{?window_zoomed_flag,#[fg=colour11]#[bold]⚡,}#(ccc-statusd pane-status #{pane_id} #{pane_pid} #{pane_current_path} #{?pane_active,1,0} #{history_size} #{history_limit} CURRENT_PROFILE DENV_ENV_NAME) #{?#{@ucc_role},#{?pane_active,#[fg=#{color_cyan}],#[fg=#{color_cyan_dimmed}]}[#{@ucc_role}] ,}#{?#{@ccc_session_id},#{?pane_active,#[fg=#{color_purple_medium}],#[fg=#{color_blue_dimmed}]}#{@ccc_session_id} ,#{?#{@ucc_session_id},#{?pane_active,#[fg=#{color_purple_medium}],#[fg=#{color_blue_dimmed}]}#{@ucc_session_id} ,}}#{?#{@ucc_status},(#{?pane_active,#{?#{==:#{@ucc_status},waiting},#[fg=#9ece6a],#[fg=#{color_yellow_bright}]},#{?#{==:#{@ucc_status},waiting},#[fg=#{color_green_dimmed}],#[fg=#{color_yellow_dimmed}]}}#{@ucc_status}#[default]) ,}' \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    if -F '#{m:*ssh*,#{pane_current_command}}' 'send-keys M-F12' \;\
    refresh-client -S \;\

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u mouse \;\
    set -u status-position \;\
    set -u status-style \;\
    set -u window-status-current-style \;\
    set -u window-status-current-format \;\
    set -u pane-border-lines \;\
    set -u pane-active-border-style \;\
    set -u pane-border-style \;\
    set -u pane-border-format \;\
    if -F '#{m:*ssh*,#{pane_current_command}}' 'send-keys S-F12' \;\
    refresh-client -S

# }}}

# Integrations {{{
# Prevent DENV_ENV_NAME from being inherited by new panes
# This ensures each pane only shows its actual environment
set-environment -g -u DENV_ENV_NAME

# sesh
set -g remain-on-exit off
set -g detach-on-destroy off
# }}}
