# Copy Mode Configuration {{{

# Vi-style keybindings (copy mode + command prompt)
setw -g mode-keys vi
set -g status-keys vi

# Copy mode visual styling - purple theme
set -g mode-style 'fg=colour250 bg=#{color_purple_bright} bold'  # bright purple selection
set -g copy-mode-match-style 'fg=#{color_text_black} bg=#{color_yellow_bright} bold'  # yellow highlights
set -g copy-mode-current-match-style 'fg=#{color_text_black} bg=#{color_yellow_dark} bold underscore'  # darker yellow for current
set -g copy-mode-mark-style 'fg=white bg=#{color_purple_dimmed} bold'  # dimmed purple for marks

# # Trigger copy mode with Alt+Up
# bind -n M-Up copy-mode

# Copy mode key bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Scrolling in copy mode
bind -T copy-mode-vi M-Up              send-keys -X scroll-up
bind -T copy-mode-vi M-Down            send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp          send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown        send-keys -X halfpage-down
bind -T copy-mode-vi PageDown          send-keys -X page-down
bind -T copy-mode-vi PageUp            send-keys -X page-up

# Clipboard integration (yank.sh handles macOS pbcopy, xclip, or OSC 52 fallback)
yank="~/.config/tmux/yank.sh"

# Copy selected text
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi Y send-keys -X copy-line \;\
    run "tmux save-buffer - | $yank"
bind-key -T copy-mode-vi D send-keys -X copy-end-of-line \;\
    run "tmux save-buffer - | $yank"
bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "$yank"
bind-key -T copy-mode-vi A send-keys -X append-selection-and-cancel \;\
    run "tmux save-buffer - | $yank"

# Copy on mouse drag end
bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe "$yank"
bind -T copy-mode-vi MouseDown1Pane select-pane \;\
   send-keys -X clear-selection

