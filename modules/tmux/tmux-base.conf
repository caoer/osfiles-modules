bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# pane-resize
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5
bind-key -r H resize-pane -L
bind-key -r J resize-pane -D
bind-key -r K resize-pane -U

# pane-maximize (column/row-local, NOT full-screen zoom — toggle, restore on 2nd press)
# f = vertical-full   : grow current pane to fill its column height (other panes shrink)
# g = horizontal-full : grow current pane to fill its row width   (other panes shrink)
# Window-scoped toggle like zoom; use one axis at a time. Restores the saved layout.
# NOTE: set-option / select-layout do NOT format-expand their args; #{window_layout}
# and #{@*_layout} only expand inside run-shell. Save + restore go through run-shell.
# While maximized, dim ONLY the squished panes (same column for f / same row for
# g). pane-dim.sh sets per-pane window-style so full-size panes keep their color.
# (window-style recolors only default-fg text; self-colored output stays colored.)
bind-key f if-shell -F '#{@vmax}' {
  run-shell 'tmux select-layout "#{@vmax_layout}"'
  run-shell '~/.config/tmux/pane-dim.sh off #{pane_id}'
  set -w @vmax 0
} {
  run-shell 'tmux set -w @vmax_layout "#{window_layout}"'
  resize-pane -y 9999
  run-shell '~/.config/tmux/pane-dim.sh y #{pane_id}'
  set -w @vmax 1
}
bind-key g if-shell -F '#{@hmax}' {
  run-shell 'tmux select-layout "#{@hmax_layout}"'
  run-shell '~/.config/tmux/pane-dim.sh off #{pane_id}'
  set -w @hmax 0
} {
  run-shell 'tmux set -w @hmax_layout "#{window_layout}"'
  resize-pane -x 9999
  run-shell '~/.config/tmux/pane-dim.sh x #{pane_id}'
  set -w @hmax 1
}

# window
bind-key c new-window -c "#{pane_current_path}"
bind-key p previous-window
bind-key n next-window
bind-key '<' swap-window -d -t -1
bind-key '>' swap-window -d -t +1
bind-key N move-window -r

# pane
bind-key -r '{' swap-pane -U
bind-key -r '}' swap-pane -D
bind-key M swap-pane
# [MANUAL] tmux.prefix.kill-pane: Prefix+x → kill pane (or window if last pane)
bind-key z resize-pane -Z

# split
bind-key s split-window -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key C-s split-window -c "#{pane_current_path}"
bind-key C-v split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"

# utility
# [MANUAL] tmux.prefix.cheatsheet: Prefix+? → cheatsheet popup (mac only, see tmux-local.conf)
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind-key V display-popup -E -w 60% -h 60% "clipse"

# session
bind-key L run-shell "sesh last"
bind-key 9 run-shell "sesh connect --root '$(pwd)'"
