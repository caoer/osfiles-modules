# tmux-base.conf — Portable core configuration
# Shared between local (macOS) and server (Linux) deployments.
# Mac additions: tmux-local.conf. Servers get this + tmux.remote-mode.conf.

# COLOR SCHEME VARIABLES {{{
# Tweak these to adjust the entire color scheme.
# To reload: Prefix + r (default: Ctrl+b then r)
#
# To preview colors in your terminal:
#   for i in {0..255}; do printf "\x1b[38;5;${i}mcolour${i}\x1b[0m\n"; done
#
# Color naming guide:
#   - colour0-15:    Standard terminal colors
#   - colour16-255:  Extended 256-color palette
#   - Hex colors:    '#RRGGBB' format (requires true color support)

# ------------------------------------------------
# THEME: Tokyo Night (Active)
# Source: https://github.com/folke/tokyonight.nvim
# ------------------------------------------------
# Primary accent colors
%hidden color_purple_bright='#bb9af7'      # Magenta (prefix indicator, highlights)
%hidden color_purple_medium='#7aa2f7'      # Blue (borders, regular text)
%hidden color_purple_dark='#283457'        # Selection bg (activity window background)
%hidden color_purple_dimmed='#414868'      # Muted (inactive states)

# Accent colors
%hidden color_yellow_bright='#e0af68'      # Yellow (active, zoom)
%hidden color_yellow_dark='#faba4a'        # Bright yellow
%hidden color_cyan='#7dcfff'               # Cyan (git/special indicators)

# Neutral backgrounds
%hidden color_bg_dark='#1a1b26'            # Main background
%hidden color_bg_medium='#24283b'          # Slightly lighter bg (borders)
%hidden color_bg_black='#15161e'           # Darkest (status bar)

# Text colors
%hidden color_text_white='#c0caf5'         # Foreground
%hidden color_text_dim='#a9b1d6'           # Dimmed text
%hidden color_text_black='#15161e'         # Dark text (for bright backgrounds)

# Alert colors
%hidden color_alert_red='#f7768e'          # Red (bells, errors)
%hidden color_alert_orange='#ff9e64'       # Orange (nested sessions)

# Dimmed accent colors (for inactive panes - colored but subdued)
%hidden color_cyan_dimmed='#5a9fc7'        # Dimmed cyan (ucc_role)
%hidden color_blue_dimmed='#5a7fc7'        # Dimmed blue (session IDs)
%hidden color_green_dimmed='#6a9a50'       # Dimmed green (waiting status)
%hidden color_yellow_dimmed='#a88550'      # Dimmed yellow (active status)

%hidden color_border_inactive_colour_bg='#283457'
%hidden color_border_active_colour='#ff9e64'

