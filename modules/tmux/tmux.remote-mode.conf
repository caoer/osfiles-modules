# ================================================
# REMOTE SESSION COLOR SCHEME - Orange/Red Theme
# ================================================
# Intentionally different from local purple theme for instant visual recognition
# Orange = "Caution: You're on a remote machine"
# ================================================

# Orange/Red shades for remote
%hidden color_remote_bright=colour208         # Bright orange (highlights)
%hidden color_remote_medium=colour202         # Medium orange-red
%hidden color_remote_dark=colour130           # Dark orange-brown
%hidden color_remote_dimmed=colour166         # Dimmed orange

# Accent colors for remote
%hidden color_remote_yellow=colour220         # Warm yellow
%hidden color_remote_red=colour196            # Bright red (alerts)

# Backgrounds for remote
%hidden color_remote_bg_dark=colour52         # Dark red-brown
%hidden color_remote_bg_medium=colour88       # Medium dark red

# Text colors for remote theme (own namespace to avoid shadowing base hex values)
%hidden color_remote_text_white=colour15
%hidden color_remote_text_black=colour0
%hidden color_remote_text_dim=colour7

# ================================================
# Remote Session Configuration
# ================================================

# Move status bar to top for remote sessions (to avoid stacking with local session)
set -g status-position top

# ================================================
# Local F12 handshake — status bar position swap
# ================================================
# Local tmux's F12 off-mode toggle forwards a signal key to the pane when it
# runs ssh (see tmux-base.conf F12 bindings):
#   M-F12 → local tmux disabled, keys come here: bar moves to bottom
#           (local's dimmed bar occupies the top row)
#   S-F12 → local tmux re-enabled: unset back to global default (top)
bind -T root M-F12 set status-position bottom \; refresh-client -S
bind -T root S-F12 set -u status-position \; refresh-client -S

# Remote status bar styling - ORANGE theme to distinguish from local purple
set -g status-style 'fg=#{color_remote_text_white} bg=#{color_remote_dark} bold'

# Status left - show hostname prominently with orange background
set -g status-left '#[fg=#{color_remote_text_black}]#[bg=#{color_remote_bright}]#[bold] 🌐 #h:#S #[default] '
set -g status-left-length 50

# Status right - orange accent
set -g status-right '#[fg=#{color_remote_text_white}]#[bg=#{color_remote_medium}] 📡 Remote #[default] %H:%M %d-%b'
set -g status-right-length 60

# ================================================
# Remote Window Status Colors - Orange Theme
# ================================================

# Current window - bright orange (very different from local yellow)
set -g window-status-current-style 'bg=#{color_remote_bright} fg=#{color_remote_text_black} bold'

# Windows with activity - orange on dark red
set -g window-status-activity-style 'fg=#{color_remote_bright} bg=#{color_remote_bg_dark}'

# Bell windows - bright red
set -g window-status-bell-style 'fg=#{color_remote_red} bg=#{color_remote_bg_medium} bold'

# Regular windows - dimmed orange on dark background
set -g window-status-style 'fg=#{color_remote_dimmed} bg=#{color_remote_bg_dark}'

# Window format (same structure as local, different colors)
set -g window-status-format ' #I:#W#{?window_zoomed_flag,[⚡],}#{?window_bell_flag,🔔,} '
set -g window-status-current-format ' #I:#W#{?window_zoomed_flag,[⚡Full],}#{?window_bell_flag,🔔,} '

# ================================================
# Remote Pane Borders - Orange Theme
# ================================================

# Active pane borders - bright orange
set -g pane-active-border-style 'fg=#{color_remote_bright} bg=default bold'

# Inactive pane borders - dimmed orange
set -g pane-border-style 'fg=#{color_remote_dark} bg=default'

# Pane border format for remote
set -g pane-border-format '#[fg=#{color_remote_bright}]🌐 Remote #[default]#P: #(ccc-statusd pane-status #{pane_id} #{pane_pid} #{pane_current_path} #{?pane_active,1,0} #{history_size} #{history_limit} CURRENT_PROFILE DENV_ENV_NAME) '

# ================================================
# System Settings for Remote
# ================================================

# Use a different prefix for remote sessions to avoid conflicts
# (Optional: uncomment if you want different prefix for remote)
# set-option -g prefix C-b
# bind-key C-b send-prefix

# Disable passthrough for remote sessions to prevent display corruption
# Remote terminals may not have complete terminfo
# This prevents vim from receiving malformed escape sequences during pane switches
set -g allow-passthrough off

# Reduce focus events to prevent redraw issues with vim
# Remote network latency + focus events can cause partial screen clears
set -g focus-events off
