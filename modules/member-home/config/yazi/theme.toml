# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/sxyazi/yazi/issues

[flavor]
dark = "tokyo-night"

# : Manager {{{

[mgr]
cwd = { fg = "#94e2d5" }

# Hovered
hovered         = { fg = "#1e1e2e", bg = "#89b4fa" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#f9e2af", italic = true }
find_position = { fg = "#f38ba8", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_copied   = { fg = "#f9e2af", bg = "#f9e2af" }
marker_cut      = { fg = "#f38ba8", bg = "#f38ba8" }

# Tab
tab_active   = { fg = "#1e1e2e", bg = "#cdd6f4" }
tab_inactive = { fg = "#cdd6f4", bg = "#45475a" }
tab_width    = 1

# Border
border_symbol = "│"
border_style  = { fg = "#6c7086" }

# Highlighting
syntect_theme = ""

# : }}}


# : Status {{{

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#45475a", bg = "#45475a" }

# Mode
mode_normal = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f2cdcd", bold = true }

# Progress
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#45475a" }
progress_error  = { fg = "#f38ba8", bg = "#45475a" }

# Permissions
permissions_t = { fg = "#a6e3a1" }
permissions_r = { fg = "#f9e2af" }
permissions_w = { fg = "#f38ba8" }
permissions_x = { fg = "#94e2d5" }
permissions_s = { fg = "#6c7086" }

# : }}}


# : Input {{{

[input]
border   = { fg = "#89b4fa" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Select {{{

[select]
border   = { fg = "#89b4fa" }
active   = { fg = "#f38ba8" }
inactive = {}

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#89b4fa" }
title   = {}
hovered = { underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#313244" }
cand            = { fg = "#94e2d5" }
rest            = { fg = "#9399b2" }
desc            = { fg = "#f38ba8" }
separator       = "  "
separator_style = { fg = "#585b70" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#f38ba8" }
exec    = { fg = "#94e2d5" }
desc    = { fg = "#9399b2" }
hovered = { bg = "#585b70", bold = true }
footer  = { fg = "#45475a", bg = "#cdd6f4" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Content-type (mime) coloring ONLY. These match identically across yazi
	# versions and color by what a file *is*, not its name.
	#
	# Filename / extension / directory coloring was deliberately removed: yazi
	# 26.1.22 silently ignored those rules (they used the old `name=` matcher),
	# so the file list showed filetype color on icons + git status on names only.
	# The 26.5.6 migration rewrote `name=` → `url=` (#3034), which ACTIVATED all
	# ~40 dormant rules at once and painted every row — the "wrong color" since
	# the upgrade. Git status (init.lua Entity:style) remains the only source of
	# filename recoloring, matching the pre-upgrade look.

	# Images
	{ mime = "image/*", fg = "#94e2d5" },

	# Videos / audio
	{ mime = "video/*", fg = "#f9e2af" },
	{ mime = "audio/*", fg = "#f9e2af" },

	# Archives
	{ mime = "application/zip",             fg = "#f38ba8" },
	{ mime = "application/gzip",            fg = "#f38ba8" },
	{ mime = "application/x-tar",           fg = "#f38ba8" },
	{ mime = "application/x-bzip",          fg = "#f38ba8" },
	{ mime = "application/x-bzip2",         fg = "#f38ba8" },
	{ mime = "application/x-7z-compressed", fg = "#f38ba8" },
	{ mime = "application/x-rar",           fg = "#f38ba8" },

	# Documents
	{ mime = "application/pdf", fg = "#f38ba8" },
]


[icon]
