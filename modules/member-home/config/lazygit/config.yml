gui:
  splitDiff: always
  sidePanelWidth: 0.26
  expandFocusedSidePanel: true
  # expandedSidePanelWeight: 6
  # enlargedSideViewLocation: left
  theme:
    activeBorderColor:
      - "#89dceb"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89dceb"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#f9e2af"
promptToReturnFromSubprocess: false
os:
  editPreset: nvim
git:
  mainBranches:
    - main
  autoFetch: true
  autoRefresh: true
  pagers:
    - colorArg: always
      pager: ""
keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
    quitWithoutChangingDirectory: Q
    togglePanel: <tab>
    prevItem: <up>
    nextItem: <down>
    prevItem-alt: k
    nextItem-alt: j
    prevPage: ","
    nextPage: .
    scrollLeft: H
    scrollRight: L
    gotoTop: <
    gotoBottom: ">"
    toggleRangeSelect: v
    rangeSelectDown: <s-down>
    rangeSelectUp: <s-up>
    prevBlock: <left>
    nextBlock: <right>
    prevBlock-alt: h
    nextBlock-alt: l
    nextBlock-alt2: <tab>
    prevBlock-alt2: <backtab>
    jumpToBlock:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
    nextMatch: "n"
    prevMatch: N
    startSearch: /
    optionMenu: x
    optionMenu-alt1: "?"
    select: <space>
    goInto: <enter>
    confirm: <enter>
    remove: d
    new: "n"
    edit: e
    openFile: o
    scrollUpMain: <pgup>
    scrollDownMain: <pgdown>
    scrollUpMain-alt1: K
    scrollDownMain-alt1: J
    scrollUpMain-alt2: <c-u>
    scrollDownMain-alt2: <c-d>
    executeShellCommand: ":"
    createRebaseOptionsMenu: m
    pushFiles: P
    pullFiles: p
    refresh: R
    createPatchOptionsMenu: <c-p>
    nextTab: "]"
    prevTab: "["
    nextScreenMode: +
    prevScreenMode: _
    undo: z
    redo: Z
    suspendApp: <c-z>
    filteringMenu: <c-s>
    diffingMenu: W
    diffingMenu-alt: <c-e>
    copyToClipboard: <c-o>
    openRecentRepos: <c-r>
    submitEditorText: <enter>
    extrasMenu: "@"
    toggleWhitespaceInDiffView: <c-w>
    increaseContextInDiffView: "}"
    decreaseContextInDiffView: "{"
customCommands:
  # Back to yazi — context-specific variants write the selected path
  # so yazi can reveal it. Fallback global just writes the repo root.
  - key: "Y"
    description: "Back to yazi (with selected file)"
    context: "files"
    command: >-
      printf '%s/%s' "$(git rev-parse --show-toplevel)" "{{.SelectedFile.Name}}" > /tmp/lazygit-yazi-selected;
      kill $(pgrep -n lazygit)
  - key: "Y"
    description: "Back to yazi (with selected commit file)"
    context: "commitFiles"
    command: >-
      printf '%s/%s' "$(git rev-parse --show-toplevel)" "{{.SelectedCommitFile.Name}}" > /tmp/lazygit-yazi-selected;
      kill $(pgrep -n lazygit)
  - key: "Y"
    description: "Back to yazi (with selected worktree)"
    context: "worktrees"
    command: >-
      echo "{{.SelectedWorktree.Path}}" > /tmp/lazygit-yazi-selected;
      kill $(pgrep -n lazygit)
  - key: "Y"
    description: "Back to yazi"
    context: "global"
    command: >-
      git rev-parse --show-toplevel > /tmp/lazygit-yazi-selected;
      kill $(pgrep -n lazygit)
  # Show PR info for the selected worktree's branch
  - key: "<c-g>"
    context: "worktrees"
    description: "Show PR info for this worktree"
    command: >-
      gh pr view "{{.SelectedWorktree.Branch}}" --json number,title,state,url,isDraft,reviewDecision --jq '"#\(.number) \(.title)\nState: \(.state)\nDraft: \(.isDraft)\nReview: \(.reviewDecision)\nURL: \(.url)"'
    output: popup
  # List ALL worktrees with their PR numbers
  - key: "<c-a>"
    context: "worktrees"
    description: "List all worktrees with PR numbers"
    command: >-
      for wt in $(git worktree list --porcelain | grep '^branch refs/heads/' | sed 's|branch refs/heads/||'); do
        pr_info=$(gh pr view "$wt" --json number,state,title --jq '"#\(.number) [\(.state)] \(.title)"' 2>/dev/null);
        if [ -n "$pr_info" ]; then
          printf "%-30s %s\n" "$wt" "$pr_info";
        else
          printf "%-30s %s\n" "$wt" "(no PR)";
        fi;
      done
    output: popup
  # Show PR info for the selected local branch
  - key: "<c-g>"
    context: "localBranches"
    description: "Show PR info for this branch"
    command: >-
      gh pr view "{{.SelectedLocalBranch.Name}}" --json number,title,state,url,isDraft,reviewDecision --jq '"#\(.number) \(.title)\nState: \(.state)\nDraft: \(.isDraft)\nReview: \(.reviewDecision)\nURL: \(.url)"'
    output: popup
